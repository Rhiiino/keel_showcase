# keel_api/config/garage.toml
# Garage single-node config for Docker Compose (dev + Ryon).
# Secrets here are dev defaults; replace rpc_secret on production deploy.

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
rpc_secret = "e191206bd9cd298a2edb34a252e9a7930508103d25cea6c1667fb6d422f22492"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "dev-garage-admin-token-replace-in-production"
metrics_token = "dev-garage-metrics-token-replace-in-production"
